<!DOCTYPE html>
<html>
<head>
<title>Page Not Found — WhatsNaija</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; margin: 0; background: #F8F6F2; color: #111;
    text-align: center; padding: 24px;
  }
  .err-wrap { max-width: 400px; }
  .err-code { font-size: 72px; font-weight: 800; color: #0C4B33; margin: 0; line-height: 1; }
  h1 { font-size: 22px; font-weight: 700; margin: 12px 0 8px; }
  p { font-size: 14px; color: #666; margin: 0 0 24px; line-height: 1.6; }
  a { display: inline-flex; align-items: center; gap: 6px; padding: 10px 22px;
    background: #0C4B33; color: #fff; text-decoration: none; border-radius: 8px;
    font-size: 14px; font-weight: 600; transition: background 0.15s; }
  a:hover { background: #0a3f2b; }
</style>
</head>
<body>
  <div class="err-wrap">
    <div class="err-code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/"><i class="fa-solid fa-house"></i> Back to Home</a>
  </div>
</body>
</html>
