<!-- Mobile bottom tab bar -->
<nav class="mobile-bottom-nav" id="mobileBottomNav">
  {% if user.is_authenticated %}
  <a href="/" class="mbn-item{% if request.path == '/' or request.path == '/popular/' or request.path == '/newest/' or request.path == '/top/' %} active{% endif %}">
    <i class="fa-solid fa-house"></i>
    <span>Home</span>
  </a>
  <a href="{% url 'posts:search' %}" class="mbn-item{% if 'search' in request.path %} active{% endif %}">
    <i class="fa-solid fa-magnifying-glass"></i>
    <span>Search</span>
  </a>
  <a href="{% url 'posts:create' %}" class="mbn-item mbn-create">
    <i class="fa-solid fa-plus"></i>
  </a>
  <a href="{% url 'users:notifications' %}" class="mbn-item{% if 'notifications' in request.path %} active{% endif %}" id="mbn-notif-bell">
    <span class="mbn-icon-wrap">
      <i class="fa-solid fa-bell"></i>
      <span class="mbn-badge" id="mbn-notif-badge" style="display:none;"></span>
    </span>
    <span>Alerts</span>
  </a>
  <a href="{% url 'users:inbox' %}" class="mbn-item{% if '/users/inbox' in request.path or '/users/messages' in request.path %} active{% endif %}" id="mbn-msg-icon">
    <span class="mbn-icon-wrap">
      <i class="fa-solid fa-envelope"></i>
      <span class="mbn-badge" id="mbn-msg-badge2" style="display:none;"></span>
    </span>
    <span>Inbox</span>
  </a>
  {% else %}
  <a href="/" class="mbn-item{% if request.path == '/' or request.path == '/popular/' or request.path == '/newest/' or request.path == '/top/' %} active{% endif %}">
    <i class="fa-solid fa-house"></i>
    <span>Home</span>
  </a>
  <a href="{% url 'posts:search' %}" class="mbn-item{% if 'search' in request.path %} active{% endif %}">
    <i class="fa-solid fa-magnifying-glass"></i>
    <span>Search</span>
  </a>
  <a href="{% url 'users:login' %}" class="mbn-item">
    <i class="fa-solid fa-arrow-right-to-bracket"></i>
    <span>Log In</span>
  </a>
  <a href="{% url 'users:register' %}" class="mbn-item mbn-register">
    <i class="fa-solid fa-user-plus"></i>
    <span>Sign Up</span>
  </a>
  {% endif %}
</nav>
